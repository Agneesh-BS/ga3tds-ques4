name: Daily Automation

on:
  schedule:
    - cron: '25 1 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: 24f1001207@ds.study.iitm.ac.in step
        run: |
          echo "Run at $(date)" >> log.txt

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add log.txt
          git commit -m "Daily update $(date)" || echo "No change"
          git push
